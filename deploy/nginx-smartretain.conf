server {
    listen 443 ssl;
    server_name sb0.braintrust-cs.com;

    ssl_certificate     /home/debian/certs/SSL1314833.pem;
    ssl_certificate_key /home/debian/certs/SSL1314833.priv;

    # ── Smart Retain — frontend estático ────────────────────────────
    location /sr/ {
        alias /opt/smartretain/frontend/dist/;
        try_files $uri $uri/ /sr/index.html;
    }

    # ── Smart Retain — API Flask (SSE streaming) ─────────────────────
    location /sr/api/ {
        proxy_pass http://127.0.0.1:5001/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        chunked_transfer_encoding on;
    }

    # ── n8n — todo lo demás ──────────────────────────────────────────
    location / {
        proxy_pass http://127.0.0.1:5678;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}

# Redirigir HTTP → HTTPS
server {
    listen 80;
    server_name sb0.braintrust-cs.com;
    return 301 https://$host$request_uri;
}
